# LookingGlass — model registry (our OPINION of known chat models).
#
# Thin + hand-maintained. NOT a mirror of BenchLLAMA, and NOT the source of truth for
# what's installed (that's live from Ollama /api/tags) or what's chat-capable (live from
# /api/show capabilities). This file is opinion only: role, quality tier, measured speed,
# whether we recommend it, and a one-line note. Edited when we make a model decision —
# same cadence as config.toml + memory.
#
# Reference machine for `tokps`/`ram_gb`: M1 Max, 32GB.
# Speed bands (feedback_speed_thresholds): >40 comfortable · >20 workable · <20 slow.
# Deeper human reference: WORKSPACE/model-rankings.md.
#
# Schema per entry (all optional except presence):
#   role        chat-default | chat-fallback | specialist | research | vision | router | tool
#   tier        flagship | standard | lite
#   tokps       measured tokens/sec on the reference machine
#   ram_gb      resident RAM during active use
#   location    local | cloud
#   recommended true highlights the model in the picker
#   note        one-line rationale shown as a subtitle

[models."gemma4:26b"]
