[model]
# Chat default. 2026-06-19: gemma4:12b → gemma4:26b (GGUF). Measured on M1 Max 32GB:
# 48.5 tok/s (faster than 12b@23.7 AND 26b-mlx@43.3), 17GB 100% GPU, honest + full Alice
# voice. CRUCIALLY GGUF honors num_ctx → KV is leashed (CONTEXT 16384, bounded regardless
# of chat length); the MLX path IGNORES num_ctx (unbounded KV → OOM risk on marathon chats)
# so 26b-mlx was rejected as default despite similar speed. Same gemma4 family = same voice.
# Cost: 17GB resident during active use (unloads after keep_alive idle). 12b stays the lean
# fallback; gemma4:latest is a per-chat pick via Settings → Model. (qwen3.5:4b-mlx dropped
# 2026-06-22 per the manifest keep_policy — fast but confabulates world-knowledge.)
# See gotcha_small_model_confabulation + reference_ollama_cloud_models (MLX num_ctx gotcha).
default = "gemma4:26b"
ollama_host = "http://localhost:11434"
think = false
# Context window sent to Ollama (in `options`). The models' OWN default is 262144
# (256K), whose KV cache dwarfs the weights — it bloats RAM for every model and makes
# the 27B models choke / time out on 32GB. 16K is ample for chat + research and keeps
# memory sane (it's what made the 27B usable at all). Raise per-need.
num_ctx = 16384
# How long Ollama keeps the model resident after our last request. Sent on every
# /api/chat call. Multi-process-safe: the timer is refreshed by ANY client's
# inference, so a model shared with another process (e.g. OllamaMCP) stays loaded
# as long as that process keeps using it. "5m" matches Ollama's own default —
# don't shorten aggressively or the model unloads during mid-chat pauses and the
# next message pays reload latency. Accepts a duration ("5m"), 0 (unload now), or
# -1 (never unload).
keep_alive = "5m"

# Mode-aware routing table (Step 5). Mirrors the [models] section in project.toml.
# Used for independent (non-project) chats; projects can override per-mode in their
# own project.toml.
#
# Rankings source: BenchLLAMA aptitude run 2026-06-10. Full table: WORKSPACE/model-rankings.md.
#
# default  — gemma4:26b (GGUF): honesty-first Alice. 48.5 tok/s, 17GB, num_ctx-leashed.
#            Beats 12b on speed + capability; same voice. 12b = lean fallback (7.6GB).
#            gemma4:latest is a per-chat option via Settings → Model.
# research — gpt-oss:120b-cloud: deep-research routes to a LARGE CLOUD model (2026-06-19).
#            Local 27b/31b-mlx were dropped (slow on 32GB: ~11-14 tok/s); depth lives in
#            cloud now (fast + 0 local RAM). Deep-research ALWAYS uses this, overriding the
#            picker (the research button = explicit consent to use cloud). gpt-oss:120b =
#            max free-tier reasoning depth; voice is mechanical but research output is a
#            report artifact + handoff, so depth wins. In-voice alternative: gemma4:31b-cloud
#            (shallower). See design_alice_hybrid_butler_specialists / reference_ollama_cloud_models.
# coding   — gemma4:12b: tool quality worker. 4/4 D7+D8, think_ok. Upgrade from gemma4:latest.
#            gemma4:latest remains the fallback if 12b is not installed.
#
# Router model (llama3.2:3b, 10/10 classify, 177 tok/s) — not yet wired into sidecar.
# Currently routing is keyword-based (router.py). Neural router is a future improvement.
# specialist — the per-turn "Consult the big model" escalation target (Phase 1a). Unlike
#            `deep_research` (depth-first artifact → gpt-oss), this is the IN-VOICE escalation:
#            gemma4:31b-cloud holds Alice's voice, so escalate-the-turn yields depth + voice
#            with no framing. Invoked only by an explicit user tap (consent). See
#            design_alice_hybrid_butler_specialists.
#
# ── SMALL-SPECIALIST FLEET prototype (2026-06-21) ────────────────────────────────────
# Trying the multi-small-model theory (strategy_small_specialist_mlx_fleet,
# design_consumer_scope_fit_testing). 3 voice/work lanes co-resident on 32GB (~16GB), no
# swap on the everyday loop; deep research = cloud. Lite-bench validated: ZINI voice 3/3,
# 12b-mlx confab 4/4. GOTCHA: ZINI is completion-only (no tools) → router.py now detects
# tool-need and routes those turns to 12b-mlx; turns that dodge the detector + need a tool
# can still fabricate on ZINI (the structural cost of a tool-less chat default — full fix
# = Option B silent-hands, deferred).
#   default       = ZINI                small chat (voice; no tools)
#   coding        = gemma4:12b-mlx      tools + code (confab-clean 4/4, has tools)
#   research      = gemma4:12b-mlx      medium research (keyword-auto)
#   deep_research = gpt-oss:120b-cloud  large deep research (research button; max depth)
#   specialist    = gemma4:31b-cloud    consult-the-big-model (in-voice escalation)
#   hands         = llama3.2:3b         SILENT-HANDS tool-caller for the tool-less voice
#                                       default. When `default` can't call tools (ZINI), a
#                                       small tool-capable model runs the agent loop and the
#                                       voice model plates the result (butler: plates, not
#                                       re-cooks). hands needs ONLY tool-calling competence,
#                                       not voice/depth — so it's small + fast. Choice is the
#                                       open BenchLLAMA question (candidate_zini_tool_caller_
#                                       companions): llama3.2:3b (router-proven, 177 t/s) vs
#                                       granite4.1:3b (agentic-tuned) vs gemma4:12b-mlx. Swap
#                                       here. Falls back to `coding` if unset.
#
# ── STABLE LOCK (restore these 4 lines + delete the fleet block to revert) ────────────
#   default    = "gemma4:26b"
#   coding     = "gemma4:12b"
#   research   = "gpt-oss:120b-cloud"
#   specialist = "gemma4:31b-cloud"
[models]
default       = "s80982708/ZINI-LOCAL:latest"
coding        = "gemma4:12b-mlx"
research      = "gemma4:12b-mlx"
deep_research = "gpt-oss:120b-cloud"
specialist    = "gemma4:31b-cloud"
hands         = "granite4.1:3b"

[server]
port = 8765
host = "127.0.0.1"

[agent]
system_prompt_path = "prompts/alice.md"
max_turns = 20

# MCP servers — each entry is spawned at startup (stdio transport).
# Tools are auto-registered alongside builtins; Alice can call them directly.
# Remove or comment-out an entry to disable that server.
[[mcp.servers]]
name    = "memoryCentral"
command = "/opt/homebrew/bin/node"
args    = ["/Users/yogi/WORK/PersonalProjects/MemoryCentral/server/index.js"]
